{% extends 'base.html' %}

{% block content %}

<style>
/* ===== MARKETPLACE STYLE ===== */

.marketplace-container {
    max-width: 1400px;
    margin: auto;
    padding: 2rem;
}

.marketplace-header h1 {
    color: #2d5016;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 2rem;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
}

.product-card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: 0.3s;
    display: flex;
    flex-direction: column;
}

.product-card:hover {
    transform: translateY(-6px);
}

.product-image {
    height: 200px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.product-info {
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.product-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #2d5016;
}

.product-price {
    font-size: 1.2rem;
    font-weight: bold;
    color: #e86b35;
}

.btn-add {
    margin-top: auto;
    padding: 0.7rem;
    background: #2d5016;
    color: white;
    text-align: center;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
}

.btn-add:hover {
    background: #1f3d0f;
}
</style>

<div class="marketplace-container">

    <div class="marketplace-header">
        <h1>Marketplace Agricole</h1>
    </div>

    <div class="products-grid">

        {% for product in products %}

        <div class="product-card">

            <div class="product-image">
                {% if product.image %}
                    <img src="{{ product.image.url }}">
                {% endif %}
            </div>

            <div class="product-info">

                <div class="product-name">
                    {{ product.name }}
                </div>

                <div class="product-price">
                    {{ product.price }} FCFA / {{ product.unit }}
                </div>

                <a href="/cart/add/{{ product.id }}/" class="btn-add">
                    Ajouter au panier
                </a>

            </div>

        </div>

        {% empty %}

        <p>Aucun produit disponible</p>

        {% endfor %}

    </div>

</div>

{% endblock %}
