{% extends 'base.html' %}

{% block content %}

<div class="row">

<div class="col-md-6">
    <img src="{{ product.image.url }}" class="img-fluid">
</div>

<div class="col-md-6">

    <h2>{{ product.name }}</h2>
    <h4>{{ product.price }} FCFA</h4>

    <!-- 🔥 STOCK VISUEL -->
    {% if product.stock > 0 %}
        <p class="text-success">
            🟢 Disponible ({{ product.stock }} en stock)
        </p>
    {% else %}
        <p class="text-danger">
            🔴 Rupture de stock
        </p>
    {% endif %}

    <br>

    <!--  ACTION -->
    {% if product.stock > 0 %}
        <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success">
            Ajouter au panier
        </a>
    {% else %}
        <button class="btn btn-secondary" disabled>
            Indisponible
        </button>
    {% endif %}

</div>

</div>

{% endblock %}
