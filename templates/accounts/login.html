{% load static %}

<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <title>Connexion AgroMarket</title>


    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet">


    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" 
    rel="stylesheet">



    <style>


        body {

            min-height:100vh;

            background: linear-gradient(
                135deg,
                #198754,
                #0d6efd
            );

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:Arial, sans-serif;

        }



        .login-card {


            width:100%;

            max-width:450px;


            background:white;


            padding:40px;


            border-radius:25px;


            box-shadow:

            0 20px 50px rgba(0,0,0,0.25);


        }




        .logo {


            width:180px;


            height:180px;


            object-fit:contain;


            display:block;


            margin:0 auto 20px auto;


        }





        h3 {


            font-weight:700;


            color:#198754;


        }





        .form-control {


            height:50px;


            border-radius:12px;


            font-size:16px;


        }





        .input-group-text {


            background:#198754;


            color:white;


            border:none;


        }





        .form-control:focus {


            border-color:#198754;


            box-shadow:0 0 0 0.2rem rgba(25,135,84,.25);


        }





        .btn-login {


            height:55px;


            border-radius:12px;


            font-size:18px;


            font-weight:bold;


            transition:0.3s;


        }





        .btn-login:hover {


            transform:scale(1.03);


        }




        .footer {


            font-size:14px;


        }



    </style>


</head>



<body>



<div class="login-card">



    <!-- LOGO AGROMARKET -->

    <img 

        src="{% static 'images/logo.jpeg' %}"

        class="logo"

        alt="AgroMarket">





    <h3 class="text-center mb-4">

        Connexion

    </h3>





    <form method="POST">


        {% csrf_token %}




        <div class="mb-3">


            <label class="form-label">

                Nom utilisateur

            </label>



            <div class="input-group">



                <span class="input-group-text">

                    <i class="bi bi-person"></i>

                </span>




                <input 

                    type="text"

                    name="username"

                    class="form-control"

                    placeholder="Votre identifiant"

                    required>



            </div>


        </div>







        <div class="mb-4">


            <label class="form-label">

                Mot de passe

            </label>




            <div class="input-group">



                <span class="input-group-text">

                    <i class="bi bi-lock"></i>

                </span>





                <input 


                    type="password"

                    name="password"

                    class="form-control"

                    placeholder="Votre mot de passe"

                    required>




            </div>


        </div>







        <button 


            type="submit"

            class="btn btn-success w-100 btn-login">



            <i class="bi bi-box-arrow-in-right"></i>


            Se connecter



        </button>





    </form>






    <p class="text-center mt-4 text-muted footer">


        AgroMarket © 2026


    </p>




</div>





</body>


</html>
