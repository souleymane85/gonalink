{% extends 'base.html' %}

{% block content %}

<style>
.auth-container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:3rem 1rem;
}

.auth-card{
    background:white;
    width:100%;
    max-width:500px;
    border-radius:12px;
    padding:2rem;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo-box{
    text-align:center;
    margin-bottom:1rem;
}

.logo-box img{
    width:80px;
    height:auto;
    margin-bottom:10px;
}

.logo-box h2{
    color:#2d5016;
    font-weight:800;
    margin:0;
}

.subtitle{
    text-align:center;
    color:#e86b35;
    font-weight:600;
    margin-bottom:1.5rem;
}

.btn-primary-custom{
    background:#2d5016;
    color:white;
    border:none;
    width:100%;
    padding:.8rem;
    border-radius:8px;
    font-weight:600;
}

.btn-primary-custom:hover{
    background:#1f3d0f;
}
</style>

<div class="auth-container">

    <div class="auth-card">

        <!-- LOGO GONALINK -->
        <div class="logo-box">

            <img src="/static/images/logo.jpeg" alt="GonaLink Logo">

            <h2>GonaLink</h2>

        </div>

        <div class="subtitle">
            🌾 Bienvenue sur GonaLink
        </div>

        <h4 class="text-center mb-3">Créer un compte</h4>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn-primary-custom">
                S'inscrire
            </button>

        </form>

        <hr>

        <div class="text-center">

            <p>Vous avez déjà un compte ?</p>

            <a href="{% url 'login' %}" class="btn btn-outline-success">
                🔑 Connexion
            </a>

        </div>

    </div>

</div>

{% endblock %}
